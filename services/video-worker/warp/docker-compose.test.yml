services:
  warp-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "8090"
      WARP_POOL_SIZE: "3"
      WARP_POOL_BASE_PORT: "8080"
      WARP_START_TIMEOUT_SECONDS: "60"
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 7s
      retries: 6
      start_period: 45s
    volumes:
      - warp-state:/var/lib/cloudflare-warp

  smoke:
    image: curlimages/curl:8.14.1
    depends_on:
      warp-proxy:
        condition: service_healthy
    volumes:
      - ./smoke-test.sh:/smoke-test.sh:ro
    entrypoint: ["/bin/sh", "/smoke-test.sh"]

volumes:
  warp-state:
